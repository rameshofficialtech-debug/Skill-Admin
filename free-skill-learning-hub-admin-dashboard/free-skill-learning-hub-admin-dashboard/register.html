<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Free Skill Learning Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-card reveal">
    <a href="index.html" class="logo auth-logo"><i class="fa-solid fa-graduation-cap"></i> Free Skill Learning Hub</a>
    <h2>Create Account</h2>
    <p>Register to save your progress and access recommended learning paths.</p>
    <form id="registerForm">
      <label class="input-group"><i class="fa-solid fa-user"></i><input id="registerName" type="text" placeholder="Full name" autocomplete="name" required /></label>
      <label class="input-group"><i class="fa-solid fa-envelope"></i><input id="registerEmail" type="email" placeholder="Email address" autocomplete="email" required /></label>
      <label class="input-group"><i class="fa-solid fa-lock"></i><input id="registerPassword" type="password" placeholder="Password" minlength="6" autocomplete="new-password" required /><button class="password-toggle" type="button" data-password-target="registerPassword" aria-label="Show password"><i class="fa-regular fa-eye"></i></button></label>
      <label class="input-group"><i class="fa-solid fa-lock"></i><input id="confirmPassword" type="password" placeholder="Confirm password" minlength="6" autocomplete="new-password" required /><button class="password-toggle" type="button" data-password-target="confirmPassword" aria-label="Show password"><i class="fa-regular fa-eye"></i></button></label>
      <p class="auth-feedback" id="registerFeedback" role="alert"></p>
      <button type="submit" class="btn primary-btn full-btn">Register</button>
      <div class="auth-divider"><span>or</span></div>
      <button type="button" class="google-btn demo-google-btn"><i class="fa-brands fa-google"></i> Sign up with Google</button>
    </form>
    <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
