<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Free Skill Learning Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-card reveal">
    <a href="index.html" class="logo auth-logo"><i class="fa-solid fa-graduation-cap"></i> Free Skill Learning Hub</a>
    <h2>Welcome Back</h2>
    <p>Login to access your courses, certificates, and learning progress.</p>
    <form id="loginForm">
      <label class="input-group"><i class="fa-solid fa-envelope"></i><input id="loginEmail" type="email" placeholder="Email address" autocomplete="email" required /></label>
      <label class="input-group"><i class="fa-solid fa-lock"></i><input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" required /><button class="password-toggle" type="button" data-password-target="loginPassword" aria-label="Show password"><i class="fa-regular fa-eye"></i></button></label>
      <a href="#" class="forgot" id="forgotPassword">Forgot password?</a>
      <button type="submit" class="btn primary-btn full-btn">Login</button>
      <div class="auth-divider"><span>or</span></div>
      <button type="button" class="google-btn demo-google-btn"><i class="fa-brands fa-google"></i> Continue with Google</button>
    </form>
    <p class="auth-link">New here? <a href="register.html">Create an account</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
